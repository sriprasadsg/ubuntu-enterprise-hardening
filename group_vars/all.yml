---
enterprise_hardening_enabled: true
hardening_environment: "{{ environment_type | default('production') }}"
backup_dir: /var/backups/ansible-harden
security_updates_auto: true
ssh_password_authentication: false
ssh_permit_root_login: "no"
ssh_ciphers:
  - chacha20-poly1305@openssh.com
  - aes256-gcm@openssh.com
  - aes128-gcm@openssh.com
  - aes256-ctr
  - aes192-ctr
  - aes128-ctr
ssh_macs:
  - hmac-sha2-512-etm@openssh.com
  - hmac-sha2-256-etm@openssh.com
  - umac-128-etm@openssh.com
  - hmac-sha2-512
  - hmac-sha2-256
ssh_kex_algorithms:
  - sntrup761x25519-sha512@openssh.com
  - curve25519-sha256
  - curve25519-sha256@libssh.org
  - diffie-hellman-group-exchange-sha256
  - diffie-hellman-group16-sha512
  - diffie-hellman-group18-sha512
  - diffie-hellman-group14-sha256
password_policy_minlen: 14
session_timeout_minutes: 15
usb_lockdown_enabled: true
apparmor_enabled: true
aide_enabled: true
auditd_enabled: true
fail2ban_enabled: true
firewall_enabled: true
open_scap_enabled: true
lynis_enabled: true
report_formats:
  - html
  - json
  - csv
  - md
