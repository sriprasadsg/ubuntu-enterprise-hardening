---
- name: Prepare report directory
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../reports"
    state: directory
    mode: '0755'
  tags: [reporting]

- name: Generate report artifacts
  ansible.builtin.command:
    cmd: >-
      python3 {{ playbook_dir }}/../scripts/generate_reports.py
      /tmp/hardening-summary.json
      {{ playbook_dir }}/../reports
  changed_when: true
  tags: [reporting]
