---
- name: Install bluetooth packages
  ansible.builtin.package:
    name: "{ bluetooth_packages }"
    state: present
  when: bluetooth_packages | length > 0
  tags: [bluetooth, packages, hardening]

- name: Deploy bluetooth configuration
  ansible.builtin.template:
    src: "bluetooth.conf.j2"
    dest: "{ bluetooth_config_path }"
    owner: root
    group: root
    mode: "0600"
    backup: true
  when:
    - bluetooth_config_path | length > 0
    - bluetooth_config_template | length > 0
  notify:
    - Restart bluetooth
  tags: [bluetooth, config, hardening]

- name: Ensure bluetooth service state
  ansible.builtin.service:
    name: "{ bluetooth_service_name | default('bluetooth') }"
    state: started
    enabled: true
  when: bluetooth_service_name | default('') | length > 0
  tags: [bluetooth, services, hardening]
