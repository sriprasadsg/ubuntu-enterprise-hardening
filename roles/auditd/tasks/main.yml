---
- name: Install auditd packages
  ansible.builtin.package:
    name: "{ auditd_packages }"
    state: present
  when: auditd_packages | length > 0
  tags: [auditd, packages, hardening]

- name: Deploy auditd configuration
  ansible.builtin.template:
    src: "auditd.conf.j2"
    dest: "{ auditd_config_path }"
    owner: root
    group: root
    mode: "0600"
    backup: true
  when:
    - auditd_config_path | length > 0
    - auditd_config_template | length > 0
  notify:
    - Restart auditd
  tags: [auditd, config, hardening]

- name: Ensure auditd service state
  ansible.builtin.service:
    name: "{ auditd_service_name | default('auditd') }"
    state: started
    enabled: true
  when: auditd_service_name | default('') | length > 0
  tags: [auditd, services, hardening]
