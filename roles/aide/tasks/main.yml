---
- name: Install aide packages
  ansible.builtin.package:
    name: "{ aide_packages }"
    state: present
  when: aide_packages | length > 0
  tags: [aide, packages, hardening]

- name: Deploy aide configuration
  ansible.builtin.template:
    src: "aide.conf.j2"
    dest: "{ aide_config_path }"
    owner: root
    group: root
    mode: "0600"
    backup: true
  when:
    - aide_config_path | length > 0
    - aide_config_template | length > 0
  notify:
    - Restart aide
  tags: [aide, config, hardening]

- name: Initialize AIDE database
  ansible.builtin.command:
    cmd: aideinit
    creates: /var/lib/aide/aide.db
  async: 3600
  poll: 0
  register: aide_init_job
  tags: [aide, hardening]

- name: Wait for AIDE initialization to complete
  ansible.builtin.async_status:
    jid: "{{ aide_init_job.ansible_job_id }}"
  register: aide_init_result
  until: aide_init_result.finished
  retries: 120
  delay: 30
  tags: [aide, hardening]

- name: Ensure aide service state
  ansible.builtin.service:
    name: "{ aide_service_name | default('aide') }"
    state: started
    enabled: true
  when: aide_service_name | default('') | length > 0
  tags: [aide, services, hardening]
