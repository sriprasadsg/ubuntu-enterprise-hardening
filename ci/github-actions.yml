---
name: ubuntu-hardening-ci
on:
  push:
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ansible ansible-lint yamllint
      - run: ansible-playbook --syntax-check playbooks/harden.yml -i inventories/production/hosts.yml
